# MongoDB connection URIs per role
mongo.uri.reader=mongodb://mongo_reader:reader_pass@localhost:27017/company_db?authSource=company_db
mongo.uri.editor=mongodb://mongo_editor:editor_pass@localhost:27017/company_db?authSource=company_db
mongo.uri.admin=mongodb://mongo_admin:admin_pass@localhost:27017/company_db?authSource=company_db

# JWT settings
jwt.secret=mySuperSecretKeyForJWTTokenGeneration2025!VeryLongAndSecure
jwt.expiration=86400000

# Server port
server.port=8080
